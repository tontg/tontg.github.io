<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join HPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .links-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .job-link {
            display: block;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .job-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .job-link:active {
            transform: translateY(-1px);
        }

        .link-title {
            display: block;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .link-url {
            display: block;
            font-size: 0.85rem;
            opacity: 0.9;
            word-break: break-all;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 0.9rem;
        }

        .alternative-section {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            color: #333;
            line-height: 1.6;
        }

        .alternative-section a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .alternative-section a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .info-section {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            color: #333;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .info-section a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .info-section a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .social-section {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            color: #333;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .social-section a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .social-section a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .job-link {
                padding: 15px;
            }

            .link-title {
                font-size: 1rem;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 20px 15px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Join HPS</h1>
        <p class="subtitle">Explore career opportunities</p>

        <div class="links-section">
            <a href="https://www.linkedin.com/company/hps/jobs/" class="job-link" target="_blank">
                <span class="link-title">LinkedIn Job Board</span>
                <span class="link-url">linkedin.com/company/hps/jobs/</span>
            </a>

            <a href="https://hps.csod.com/ux/ats/careersite/1/home?c=hps" class="job-link" target="_blank">
                <span class="link-title">HPS Career Site</span>
                <span class="link-url">hps.csod.com/ux/ats/careersite/1/home</span>
            </a>
        </div>

        <div class="alternative-section">
            <p><strong>Spontaneous application:</strong> <a href="mailto:careers@hps-worldwide.com" target="_blank">careers@hps-worldwide.com</a></p>
        </div>

        <div class="info-section">
            <p><strong>Want to know more about HPS?</strong> <a href="https://www.hps-worldwide.com/sites/default/files/investor/fr/HPS%20RFA_2024.pdf" target="_blank">Read the annual report</a></p>
        </div>

        <div class="social-section">
            <p><strong>Follow us on</strong> <a href="https://www.instagram.com/lifeathps/" target="_blank">Instagram</a> and <a href="https://www.youtube.com/@hpsworldwide4248" target="_blank">Youtube</a></p>
        </div>

        <!--div class="footer">
            <p>© 2026 HPS. All rights reserved.</p>
        </div-->
    </div>
</body>
</html>
